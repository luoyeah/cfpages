<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电池状态监控</title>
  <script src="../js/vue_3.5.25.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      max-width: 800px;
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    header {
      background: rgba(0, 0, 0, 0.3);
      padding: 25px 30px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    h1 {
      color: white;
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }
    
    .subtitle {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.1rem;
    }
    
    .content {
      padding: 30px;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      margin-bottom: 25px;
      transition: transform 0.3s ease;
    }
    
    .card:hover {
      transform: translateY(-5px);
    }
    
    .card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #2c3e50;
      margin-bottom: 20px;
      font-size: 1.5rem;
    }
    
    .card-title i {
      color: #3498db;
    }
    
    .battery-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
    }
    
    .battery-display {
      position: relative;
      width: 200px;
      height: 400px;
      border: 8px solid #2c3e50;
      border-radius: 20px;
      background: rgba(236, 240, 241, 0.7);
      overflow: hidden;
    }
    
    .battery-level {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, #2ecc71, #27ae60);
      transition: height 1s ease;
    }
    
    .battery-cap {
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 25px;
      background: #2c3e50;
      border-radius: 5px 5px 0 0;
    }
    
    .battery-info {
      text-align: center;
      font-size: 1.8rem;
      font-weight: bold;
      color: #2c3e50;
    }
    
    .battery-percentage {
      font-size: 3.5rem;
      color: #27ae60;
      margin: 10px 0;
    }
    
    .status-indicator {
      display: inline-block;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      margin-right: 8px;
    }
    
    .charging {
      background-color: #f1c40f;
      box-shadow: 0 0 10px #f1c40f;
    }
    
    .discharging {
      background-color: #e74c3c;
    }
    
    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }
    
    button {
      padding: 12px 25px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(to right, #3498db, #2980b9);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
    }
    
    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 15px rgba(52, 152, 219, 0.4);
    }
    
    button:active {
      transform: translateY(1px);
    }
    
    button.refresh {
      background: linear-gradient(to right, #2ecc71, #27ae60);
      box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
    }
    
    button.refresh:hover {
      box-shadow: 0 6px 15px rgba(46, 204, 113, 0.4);
    }
    
    button.auto-refresh {
      background: linear-gradient(to right, #9b59b6, #8e44ad);
      box-shadow: 0 4px 10px rgba(155, 89, 182, 0.3);
    }
    
    button.auto-refresh:hover {
      box-shadow: 0 6px 15px rgba(155, 89, 182, 0.4);
    }
    
    .status-card {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    
    .status-item {
      background: rgba(236, 240, 241, 0.7);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    
    .status-label {
      font-size: 1.1rem;
      color: #7f8c8d;
      margin-bottom: 10px;
    }
    
    .status-value {
      font-size: 1.8rem;
      font-weight: bold;
      color: #2c3e50;
    }
    
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(52, 152, 219, 0.3);
      border-top: 5px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .error {
      background: rgba(231, 76, 60, 0.2);
      border-left: 5px solid #e74c3c;
      padding: 20px;
      border-radius: 5px;
      color: #c0392b;
      text-align: center;
    }
    
    footer {
      text-align: center;
      padding: 20px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    @media (max-width: 600px) {
      .battery-display {
        width: 150px;
        height: 300px;
      }
      
      .battery-percentage {
        font-size: 2.5rem;
      }
      
      .controls {
        flex-direction: column;
        align-items: center;
      }
      
      button {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="container">
      <header>
        <h1><i class="fas fa-battery-three-quarters"></i> 电池状态监控</h1>
        <p class="subtitle">实时监控系统电池状态</p>
      </header>
      
      <div class="content">
        <div class="card">
          <div class="card-title">
            <i class="fas fa-bolt"></i>
            <h2>电池状态概览</h2>
          </div>
          
          <div v-if="loading" class="loading">
            <div class="spinner"></div>
            <p>正在获取电池信息...</p>
          </div>
          
          <div v-else-if="error" class="error">
            <i class="fas fa-exclamation-triangle"></i>
            <p>{{ errorMessage }}</p>
            <button class="refresh" @click="fetchBattery"><i class="fas fa-sync-alt"></i> 重试</button>
          </div>
          
          <div v-else class="battery-container">
            <div class="battery-display">
              <div class="battery-cap"></div>
              <div class="battery-level" :style="{ height: batteryLevel + '%', background: batteryColor }"></div>
            </div>
            
            <div class="battery-info">
              <div>当前电量</div>
              <div class="battery-percentage">{{ batteryLevel }}%</div>
              <div>
                <span class="status-indicator" :class="isCharging ? 'charging' : 'discharging'"></span>
                {{ isCharging ? '充电中' : '放电中' }}
              </div>
            </div>
            
            <div class="controls">
              <button class="refresh" @click="fetchBattery">
                <i class="fas fa-sync-alt"></i> 刷新数据
              </button>
              <button class="auto-refresh" @click="toggleAutoRefresh">
                <i :class="autoRefresh ? 'fas fa-stop-circle' : 'fas fa-play-circle'"></i>
                {{ autoRefresh ? '停止自动刷新' : '开启自动刷新' }}
              </button>
            </div>
          </div>
        </div>
        
        <div class="card">
          <div class="card-title">
            <i class="fas fa-chart-bar"></i>
            <h2>详细状态信息</h2>
          </div>
          
          <div class="status-card">
            <div class="status-item">
              <div class="status-label">电池温度</div>
              <div class="status-value">{{ temperature }}°C</div>
            </div>
            <div class="status-item">
              <div class="status-label">电压</div>
              <div class="status-value">{{ voltage }}V</div>
            </div>
            <div class="status-item">
              <div class="status-label">健康状态</div>
              <div class="status-value">{{ healthStatus }}</div>
            </div>
            <div class="status-item">
              <div class="status-label">技术类型</div>
              <div class="status-value">{{ technology }}</div>
            </div>
          </div>
        </div>
      </div>
      
      <footer>
        <p>最后更新时间: {{ lastUpdated || '尚未获取数据' }}</p>
        <p>© 2023 电池监控系统 | 使用 Vue 3 构建</p>
      </footer>
    </div>
  </div>

  <script>
    const { createApp, ref, computed, onMounted, onUnmounted } = Vue;
    
    createApp({
      setup() {
        // 响应式数据
        const batteryLevel = ref(0);
        const isCharging = ref(false);
        const temperature = ref(0);
        const voltage = ref(0);
        const healthStatus = ref('未知');
        const technology = ref('未知');
        const lastUpdated = ref(null);
        const loading = ref(true);
        const error = ref(false);
        const errorMessage = ref('');
        const autoRefresh = ref(false);
        const refreshInterval = ref(null);
        
        // 计算属性
        const batteryColor = computed(() => {
          if (batteryLevel.value >= 70) return 'linear-gradient(to top, #2ecc71, #27ae60)';
          if (batteryLevel.value >= 30) return 'linear-gradient(to top, #f39c12, #e67e22)';
          return 'linear-gradient(to top, #e74c3c, #c0392b)';
        });
        
        // 获取电池信息
        const fetchBattery = async () => {
          loading.value = true;
          error.value = false;
          
          try {
            // 模拟API调用
            
            const response = await fetch("/api/adb/battery");
            const data = await response.json();
            
            // 模拟API响应数据
            // await new Promise(resolve => setTimeout(resolve, 800)); // 模拟网络延迟
            // const data = {
            //   level: Math.floor(Math.random() * 41) + 60, // 60-100%
            //   charging: Math.random() > 0.5,
            //   temperature: (Math.random() * 20 + 20).toFixed(1), // 20-40°C
            //   voltage: (3.7 + Math.random() * 0.5).toFixed(2), // 3.7-4.2V
            //   health: ['良好', '一般', '优秀'][Math.floor(Math.random() * 3)],
            //   technology: ['Li-ion', 'Li-Po'][Math.floor(Math.random() * 2)]
            // };
            
            // 更新数据
            batteryLevel.value = data.level;
            isCharging.value = data.charging;
            temperature.value = data.temperature / 10;
            voltage.value = data.voltage / 1000;
            healthStatus.value = data.health;
            technology.value = data.technology;
            lastUpdated.value = new Date().toLocaleTimeString();
          } catch (err) {
            console.error('获取电池信息失败:', err);
            error.value = true;
            errorMessage.value = '无法获取电池信息，请检查网络连接或稍后再试';
          } finally {
            loading.value = false;
          }
        };
        
        // 切换自动刷新
        const toggleAutoRefresh = () => {
          autoRefresh.value = !autoRefresh.value;
          
          if (autoRefresh.value) {
            // 每30秒刷新一次
            refreshInterval.value = setInterval(fetchBattery, 30000);
          } else {
            clearInterval(refreshInterval.value);
          }
        };
        
        // 组件挂载时获取数据
        onMounted(() => {
          fetchBattery();
        });
        
        // 组件卸载时清除定时器
        onUnmounted(() => {
          if (refreshInterval.value) {
            clearInterval(refreshInterval.value);
          }
        });
        
        return {
          batteryLevel,
          isCharging,
          temperature,
          voltage,
          healthStatus,
          technology,
          lastUpdated,
          loading,
          error,
          errorMessage,
          autoRefresh,
          batteryColor,
          fetchBattery,
          toggleAutoRefresh
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
